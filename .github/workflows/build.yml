name: Build with Nix
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: [self-hosted, nix]
    steps:
      - uses: actions/checkout@v4

      - name: Build gui flavour
        run: nix build .

      - name: Build terminal flavour
        run: nix build .#terminal

      - name: Check Formatting
        run: nix develop --command just format-check

      - name: Run tests
        run: nix flake check --all-systems

  review:
    needs: build
    permissions:
      contents: read
      pull-requests: write
    runs-on: [self-hosted, nix]
    steps:
      - uses: actions/checkout@v4
      - uses: machinology/mach-pull-request-review-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ollama-url: ${{ secrets.OLLAMA_URL }}
          ollama-model: "qwen3-coder:30b"
          review-focus: "bugs,security,performance"
          max-comments: 20
