name: Update flakes

on:
  workflow_dispatch:
    inputs:
      flakes-to-update:
        description: "Specific flake inputs to be updated (space-separated. Leave empty to update all flakes."
        required: false
        type: string
  schedule:
    - cron: "0 12 * * 0" # every Sunday at 12pm

jobs:
  lockfile:
    permissions:
      contents: write
      pull-requests: write
    runs-on: [self-hosted, nix]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/update-flake-lock@main
        with:
          token: ${{ secrets.PR_UPDATE_TOKEN }}
          pr-title: "Update flake inputs"
          pr-labels: |
            dependencies
            automated
            automerge
          inputs: ${{ github.event.inputs.flakes-to-update }}
